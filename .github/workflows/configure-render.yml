name: Configure Render Groq Key

on:
  workflow_dispatch:
    inputs:
      render_api_key:
        description: Render API key (Account Settings -> API Keys)
        required: true
        type: string
      groq_api_key:
        description: Groq API key (starts with gsk_)
        required: true
        type: string

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Set Groq key on Render backend and redeploy
        env:
          RENDER_API_KEY: ${{ inputs.render_api_key }}
          GROQ_API_KEY: ${{ inputs.groq_api_key }}
        run: |
          set -euo pipefail
          SERVICE_ID=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?limit=50" | \
            python3 -c "import sys,json; data=json.load(sys.stdin); print(next(x['service']['id'] for x in data if x['service']['name']=='deim-backend'))")

          echo "Updating env vars on service $SERVICE_ID"
          curl -sf -X PUT \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${SERVICE_ID}/env-vars" \
            -d "[{\"key\":\"Groq__ApiKey\",\"value\":\"${GROQ_API_KEY}\"},{\"key\":\"GROQ_API_KEY\",\"value\":\"${GROQ_API_KEY}\"},{\"key\":\"Groq__Model\",\"value\":\"llama-3.1-8b-instant\"}]"

          echo "Triggering redeploy"
          curl -sf -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -d "{}"

          echo "Done."
